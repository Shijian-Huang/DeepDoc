<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeepDoc</title>
    <link rel="stylesheet" href="/static/styles.css?v=anonymous-pdf-preview-20260722" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div class="brand-lockup">
            <h1 id="brandHomeButton" tabindex="0">DeepDoc</h1>
            <p>Read papers with evidence you can verify.</p>
          </div>
          <div class="topbar-actions">
            <button id="openHistoryButton" class="icon-button" type="button" aria-label="History" title="History">History</button>
            <a class="icon-button" href="https://github.com/Shijian-Huang/DeepDoc" target="_blank" rel="noreferrer" aria-label="GitHub" title="GitHub">GitHub</a>
            <div id="authBox" class="auth-box" hidden>
              <div id="authEntry" class="auth-entry">
                <button id="showSignInButton" class="auth-pill" type="button">Sign In</button>
                <button id="showSignUpButton" type="button" hidden>Sign up</button>
              </div>
              <div id="authSession" class="auth-session" hidden>
                <button id="authAvatarButton" class="auth-avatar-button" type="button" aria-label="Account" aria-expanded="false"></button>
                <div id="authAccountMenu" class="auth-account-menu" hidden>
                  <span id="authUserEmail"></span>
                  <button id="authSignOutButton" type="button">Sign Out</button>
                </div>
              </div>
            </div>
          </div>
        </header>

        <section class="tool-surface" aria-label="PDF analysis controls">
          <div class="source-tabs" role="tablist" aria-label="Paper source">
            <button class="source-tab active" type="button" data-source-tab="upload">Upload PDF</button>
            <button class="source-tab" type="button" data-source-tab="arxiv">Search arXiv</button>
          </div>

          <div class="source-panel active" data-source-panel="upload">
            <form id="uploadForm" class="upload-form">
              <label class="drop-zone" for="pdfFile">
                <input id="pdfFile" name="file" type="file" accept="application/pdf" required />
                <span class="drop-icon">PDF</span>
                <span class="drop-title" id="fileLabel">Drop a research paper</span>
                <span class="drop-choice">or choose a PDF</span>
                <span class="drop-meta">Supports text-based academic PDFs.</span>
              </label>

              <fieldset class="mode-group">
                <legend>Summary</legend>
                <label>
                  <input type="radio" name="summaryMode" value="paragraph" />
                  <span><strong>Quick</strong><small>Should I read this?</small></span>
                </label>
                <label>
                  <input type="radio" name="summaryMode" value="standard" checked />
                  <span><strong>Standard</strong><small>Understand this paper</small></span>
                </label>
                <label>
                  <input type="radio" name="summaryMode" value="one_page" />
                  <span><strong>Detailed</strong><small>Study for discussion</small></span>
                </label>
              </fieldset>

              <button id="analyzeButton" class="analyze-button" type="submit" aria-live="polite">
                Analyze Paper
              </button>
            </form>
          </div>

          <div class="source-panel" data-source-panel="arxiv">
            <form id="arxivSearchForm" class="arxiv-search-form">
              <div class="arxiv-query">
                <label for="arxivQuery">Search arXiv</label>
                <div class="arxiv-input-wrap">
                  <input id="arxivQuery" type="search" placeholder="Search papers, topics, or authors..." autocomplete="off" />
                  <button id="arxivSearchButton" class="arxiv-search-button" type="submit" aria-label="Search arXiv">Search</button>
                </div>
              </div>
              <div class="arxiv-filter-row">
                <label class="compact-select">
                  <span>Search in</span>
                  <select id="arxivSearchField">
                    <option value="all" selected>All fields</option>
                    <option value="title">Title</option>
                    <option value="author">Author</option>
                    <option value="abstract">Abstract</option>
                  </select>
                </label>
                <label class="compact-select">
                  <span>Category</span>
                  <select id="arxivCategory">
                    <option value="">All categories</option>
                    <option value="cs.AI">cs.AI</option>
                    <option value="cs.CL">cs.CL</option>
                    <option value="cs.CV">cs.CV</option>
                    <option value="cs.LG">cs.LG</option>
                    <option value="cs.RO">cs.RO</option>
                    <option value="eess.AS">eess.AS</option>
                    <option value="math.OC">math.OC</option>
                    <option value="physics.comp-ph">physics.comp-ph</option>
                    <option value="stat.ML">stat.ML</option>
                  </select>
                </label>
                <label class="compact-select">
                  <span>Results</span>
                  <select id="arxivMaxResults">
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20" selected>20</option>
                    <option value="25">25</option>
                  </select>
                </label>
                <label class="compact-select">
                  <span>Sort</span>
                  <select id="arxivSortMode">
                    <option value="relevance-desc" selected>Best match</option>
                    <option value="submittedDate-desc">Newest submitted</option>
                    <option value="submittedDate-asc">Oldest submitted</option>
                    <option value="lastUpdatedDate-desc">Recently updated</option>
                    <option value="lastUpdatedDate-asc">Oldest updated</option>
                  </select>
                </label>
                <label class="compact-select">
                  <span>Summary</span>
                  <select id="arxivSummaryMode">
                    <option value="paragraph">Quick · Should I read this?</option>
                    <option value="standard" selected>Standard · Understand this paper</option>
                    <option value="one_page">Detailed · Study for discussion</option>
                  </select>
                </label>
              </div>
            </form>
            <div id="popularSearches" class="popular-searches" aria-label="Popular arXiv searches">
              <span>Popular searches</span>
              <button type="button" data-popular-query="large language models">LLM</button>
              <button type="button" data-popular-query="diffusion models">Diffusion</button>
              <button type="button" data-popular-query="computer vision">Vision</button>
              <button type="button" data-popular-query="robotics">Robotics</button>
              <button type="button" data-popular-query="reasoning agents">Agents</button>
            </div>
            <div id="arxivSearchStatus" class="result-meta arxiv-search-status"></div>
            <div id="arxivResults" class="arxiv-results"></div>
            <div id="arxivPagination" class="arxiv-pagination" hidden>
              <button id="arxivPrevButton" class="ghost-button compact-action" type="button">Previous</button>
              <span id="arxivPageInfo" class="result-meta">Page 1</span>
              <button id="arxivNextButton" class="ghost-button compact-action" type="button">Next</button>
            </div>
          </div>
        </section>

        <section id="statusPanel" class="status-panel" hidden>
          <div class="spinner"></div>
          <p id="statusText">Analyzing paper...</p>
        </section>

        <section id="resultPanel" class="result-panel empty-state"></section>
      </section>

      <button id="historyOverlay" class="history-overlay" type="button" aria-label="Close history" hidden></button>
      <div id="authModal" class="auth-modal" hidden>
        <button id="authModalOverlay" class="auth-modal-overlay" type="button" aria-label="Close sign in"></button>
        <section class="auth-modal-card" role="dialog" aria-modal="true" aria-labelledby="authFormTitle">
          <button id="authModalCloseButton" class="auth-modal-close" type="button" aria-label="Close sign in">×</button>
          <form id="authForm" class="auth-form" novalidate>
            <h2 id="authFormTitle" class="auth-form-title">Sign in to DeepDoc</h2>
            <label>
              <span>Email</span>
              <input id="authEmail" type="email" autocomplete="email" required />
            </label>
            <label>
              <span>Password</span>
              <input id="authPassword" type="password" autocomplete="current-password" required />
            </label>
            <button id="authSubmitButton" class="auth-submit-button" type="submit">Continue</button>
            <button id="authCancelButton" class="auth-cancel-button" type="button">Cancel</button>
            <button id="authModeToggleButton" class="auth-mode-toggle" type="button">Sign up instead</button>
            <p id="authStatus" class="auth-status"></p>
          </form>
        </section>
      </div>
      <aside id="historyPanel" class="history-panel" aria-label="Analysis history" aria-hidden="true">
        <div class="history-header">
          <div>
            <p class="eyebrow">History</p>
            <h2>Recent Analyses</h2>
          </div>
          <div class="history-header-actions">
            <button id="refreshHistoryButton" class="ghost-button" type="button">Refresh</button>
            <button id="closeHistoryButton" class="ghost-button icon-button" type="button" aria-label="Close history">×</button>
          </div>
        </div>
        <div class="history-controls" aria-label="History search and filters">
          <label class="history-search">
            <span>Search history</span>
            <input id="historySearch" type="search" placeholder="Title, file, summary..." autocomplete="off" />
          </label>
          <label class="history-filter">
            <span>Filter</span>
            <select id="historyModeFilter">
              <option value="all">All modes</option>
              <option value="paragraph">Quick · Should I read this?</option>
              <option value="standard">Standard · Understand this paper</option>
              <option value="one_page">Detailed · Study for discussion</option>
            </select>
          </label>
          <label class="history-date">
            <span>Date</span>
            <input id="historyDateFilter" type="date" />
          </label>
        </div>
        <div id="historyList" class="history-list"></div>
      </aside>
    </main>

    <template id="resultTemplate">
      <div class="result-header">
        <div>
          <p class="eyebrow" data-field="mode"></p>
          <h2 data-field="title">Analysis Result</h2>
          <p class="result-meta" data-field="meta"></p>
        </div>
        <div class="result-actions">
          <details class="download-menu">
            <summary class="download-button">Download</summary>
            <div class="download-menu-list">
              <p>Analysis</p>
              <a data-field="downloadMarkdown" href="#" download>Markdown</a>
              <a data-field="download" href="#" download>JSON</a>
              <p>Slides</p>
              <a data-field="downloadSlidesHtml" href="#" download hidden>HTML</a>
              <a data-field="downloadSlides" href="#" download hidden>Markdown</a>
              <a data-field="downloadScript" href="#" download hidden>JSON</a>
              <a data-field="downloadVideo" href="#" download hidden>Narrated MP4</a>
              <p>Document</p>
              <a data-field="downloadPdf" href="#" download hidden>Original PDF</a>
            </div>
          </details>
          <label class="reanalyze-mode-control">
            <span>Mode</span>
            <select data-field="reanalyzeMode" aria-label="Reanalysis summary mode">
              <option value="paragraph">Quick · Should I read this?</option>
              <option value="standard">Standard · Understand this paper</option>
              <option value="one_page">Detailed · Study for discussion</option>
            </select>
          </label>
          <button class="ghost-button compact-action" type="button" data-field="reanalyze">Reanalyze as New</button>
        </div>
      </div>

      <div class="reading-layout">
        <div class="analysis-column">
          <div class="tabs" role="tablist">
            <button class="tab-button active" type="button" data-tab="summary">Overview</button>
            <button class="tab-button" type="button" data-tab="evidence">Evidence</button>
            <button class="tab-button" type="button" data-tab="references">References</button>
            <button class="tab-button" type="button" data-tab="video">Slides</button>
          </div>

          <section class="tab-panel active" data-panel="summary">
            <article class="summary-block">
              <div class="section-heading">
                <div>
                  <h3>Overview</h3>
                  <p class="section-meta" data-field="overviewMeta"></p>
                </div>
                <button class="copy-button" type="button" data-copy-field="summary">Copy</button>
              </div>
              <div class="overview-copy" data-field="summary"></div>
              <button class="show-more-button" type="button" data-field="toggleOverview">Read more</button>
            </article>
            <div class="summary-grid">
              <article class="key-ideas-card">
                <div class="section-heading">
                  <h3>Key Ideas</h3>
                  <button class="copy-button" type="button" data-copy-field="keyIdeas">Copy</button>
                </div>
                <ol data-field="keyIdeas"></ol>
              </article>
              <article class="contributions-card">
                <div class="section-heading">
                  <h3>Contributions</h3>
                  <button class="copy-button" type="button" data-copy-field="contributions">Copy</button>
                </div>
                <ol data-field="contributions"></ol>
              </article>
            </div>
            <article class="paper-info-card">
              <h3>Paper Info</h3>
              <div data-field="paperInfo"></div>
            </article>
          </section>

          <section class="tab-panel" data-panel="evidence">
            <div class="evidence-layout">
              <article>
                <h3>Claim Evidence</h3>
                <div data-field="evidence"></div>
              </article>
              <article>
                <h3>Source Sections</h3>
                <div data-field="sources"></div>
              </article>
            </div>
          </section>

          <section class="tab-panel" data-panel="references">
            <article>
              <h3>References</h3>
              <p class="reference-status" data-field="referenceStatus" hidden></p>
              <ol data-field="references"></ol>
            </article>
          </section>

          <section class="tab-panel" data-panel="video">
            <article class="video-script-panel">
              <div class="video-script-header">
                <div>
                  <h3>Slides</h3>
                  <p class="result-meta">Generate a slide outline, then optionally create a narrated MP4.</p>
                </div>
              </div>
              <div class="video-control-bar">
                <div class="slide-stage">
                  <p class="stage-label">Outline Settings</p>
                  <label class="slide-count-control">
                    <span>Length</span>
                    <select data-field="slideCount">
                      <option value="5">5 Brief</option>
                      <option value="8">8 Balanced</option>
                      <option value="10" selected>10 Deep dive</option>
                      <option value="15">15 Lecture</option>
                    </select>
                  </label>
                </div>
                <div class="slide-stage">
                  <p class="stage-label">Export</p>
                  <div class="artifact-state-strip" aria-label="Slides and MP4 status">
                    <span class="artifact-state" data-field="slidesState">Slides not generated</span>
                    <span class="artifact-state" data-field="mp4State">MP4 not generated</span>
                  </div>
                  <div class="video-actions">
                    <button class="primary-button compact-action" type="button" data-field="generateVideoScript">Generate Slides</button>
                    <button class="ghost-button compact-action" type="button" data-field="generateVideo">Generate Narrated MP4</button>
                  </div>
                </div>
              </div>
              <div data-field="videoStatus" class="result-meta"></div>
              <div data-field="videoScript"></div>
            </article>
          </section>
        </div>

        <aside class="pdf-panel" data-field="pdfPanel">
          <iframe data-field="pdfViewer" title="Original PDF viewer"></iframe>
          <div class="pdf-placeholder" data-field="pdfPlaceholder" hidden>
            Original PDF is not available for this analysis.
          </div>
        </aside>
      </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/static/app.js?v=anonymous-pdf-preview-20260722"></script>
  </body>
</html>
